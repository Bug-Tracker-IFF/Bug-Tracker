<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bug Tracker - Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#197fe6",
              "background-light": "#f6f7f8",
              "background-dark": "#111921",
            },
            fontFamily: {
              "display": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
</head>
<body class="font-display">
<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap px-4 sm:px-10 py-5">
<div class="flex items-center gap-3 text-slate-800 dark:text-white">
<div class="size-6 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-xl font-bold leading-tight tracking-[-0.015em]">Bug Tracker</h2>
</div>
</header>
<main class="flex flex-1 items-center justify-center p-4">
<div class="flex w-full max-w-md flex-col items-center rounded-xl bg-white dark:bg-[#1a2632] shadow-sm dark:border dark:border-slate-800">
<div class="w-full p-8 sm:p-10">
<div class="flex flex-col gap-2 mb-8 text-center">
<h1 class="text-slate-800 dark:text-white text-3xl sm:text-4xl font-black leading-tight tracking-[-0.033em]">Create Your Account</h1>
<p class="text-slate-500 dark:text-slate-400">Join Bug Tracker to start managing your projects.</p>
</div>
<form class="flex flex-col gap-6">
<label class="flex flex-col w-full">
<p class="text-slate-800 dark:text-white text-base font-medium leading-normal pb-2">Name</p>
<input class="form-input flex w-full resize-none overflow-hidden rounded-lg text-slate-800 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-[#344d65] bg-white dark:bg-transparent h-12 placeholder:text-slate-400 dark:placeholder:text-[#93adc8] px-4 text-base font-normal leading-normal" placeholder="Enter your full name" type="text"/>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-800 dark:text-white text-base font-medium leading-normal pb-2">Email</p>
<input class="form-input flex w-full resize-none overflow-hidden rounded-lg text-slate-800 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-[#344d65] bg-white dark:bg-transparent h-12 placeholder:text-slate-400 dark:placeholder:text-[#93adc8] px-4 text-base font-normal leading-normal" placeholder="Enter your email address" type="email"/>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-800 dark:text-white text-base font-medium leading-normal pb-2">Password</p>
<div class="relative flex w-full items-stretch">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-800 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-[#344d65] bg-white dark:bg-transparent h-12 placeholder:text-slate-400 dark:placeholder:text-[#93adc8] px-4 text-base font-normal leading-normal" placeholder="Enter a secure password" type="password"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-3">
<span class="material-symbols-outlined text-slate-400 dark:text-[#93adc8]">visibility</span>
</div>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-800 dark:text-white text-base font-medium leading-normal pb-2">Role</p>
<div class="relative">
<select class="form-select w-full appearance-none rounded-lg text-slate-800 dark:text-white border border-slate-300 dark:border-[#344d65] bg-white dark:bg-transparent h-12 px-4 focus:outline-none focus:ring-2 focus:ring-primary/50">
<option>Manager</option>
<option>Developer</option>
<option>QA</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400 dark:text-[#93adc8]">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</label>
<button class="flex items-center justify-center whitespace-nowrap h-12 px-6 bg-primary text-white font-bold text-base leading-normal rounded-lg w-full mt-2 hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary/50" type="submit">Register</button>
</form>
</div>
<div class="w-full border-t border-slate-200 dark:border-slate-800 p-6 text-center">
<p class="text-slate-500 dark:text-slate-400">Already have an account? <a class="font-semibold text-primary hover:underline" href="#">Log In</a></p>
</div>
</div>
</main>
</div>
</div>
</body></html>
